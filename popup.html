<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SingulEYE</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="hero-brand">
            <div class="hero-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="hero-label">SingulEYE</span>
          </div>
          <span class="hero-version">v1.0</span>
        </div>
        <h1 class="hero-title">탭 차단 설정</h1>
        <div class="status-chip">
          <span class="status-dot"></span>
          <span id="statusLine">현재 페이지 정보를 불러오는 중입니다...</span>
        </div>
        <div class="stat-bar">
          <div class="stat-item">
            <span class="stat-label">숨김</span>
            <strong class="stat-value" id="hiddenCountValue">-</strong>
          </div>
          <span class="stat-divider"></span>
          <div class="stat-item">
            <span class="stat-label">차단</span>
            <strong class="stat-value" id="blockedHeadCountValue">-</strong>
          </div>
        </div>
      </header>

      <section class="panel fade-in" style="animation-delay:.06s">
        <div class="section-heading">
          <div class="section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <h2>작성자 필터</h2>
            <p>유동 IP·ㅇㅇ 고닉 글과 댓글을 각각 제어합니다</p>
          </div>
        </div>

        <label class="setting-row" for="floatingIpToggle">
          <div class="copy-block">
            <strong>유동 IP 글 보기</strong>
            <span>OFF로 바꾸면 목록에서 바로 숨겨집니다</span>
          </div>
          <input class="toggle-input" id="floatingIpToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>

        <label class="setting-row" for="floatingIpCommentToggle">
          <div class="copy-block">
            <strong>유동 IP 댓글 보기</strong>
            <span>OFF로 바꾸면 본문 댓글에서 바로 숨겨집니다</span>
          </div>
          <input class="toggle-input" id="floatingIpCommentToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>

        <label class="setting-row" for="ooNickToggle">
          <div class="copy-block">
            <strong>ㅇㅇ 고닉 글 보기</strong>
            <span>OFF로 바꾸면 ㅇㅇ 반고닉 글이 목록에서 숨겨집니다</span>
          </div>
          <input class="toggle-input" id="ooNickToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>
      </section>

      <section class="panel fade-in" style="animation-delay:.09s">
        <div class="section-heading">
          <div class="section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <h2>읽은 글 표시</h2>
            <p>한번 본 글 앞에 ✓ 표시를 달아 구분합니다</p>
          </div>
        </div>

        <label class="setting-row" for="visitedMarksToggle">
          <div class="copy-block">
            <strong>읽은 글 체크 표시</strong>
            <span>ON이면 이미 본 글 제목 앞에 ✓ 가 표시됩니다</span>
          </div>
          <input class="toggle-input" id="visitedMarksToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>

        <div class="visited-footer">
          <span class="visited-count" id="visitedCountLabel">기록 0개</span>
          <button class="action-button action-button--danger" id="clearVisitedButton" type="button">기록 초기화</button>
        </div>
      </section>

      <section class="panel fade-in" style="animation-delay:.12s">
        <div class="section-heading">
          <div class="section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <h2>스팸 필터</h2>
            <p>중복·유사 제목 자동 제거 및 공지 보호</p>
          </div>
        </div>

        <label class="setting-row" for="duplicateExactToggle">
          <div class="copy-block">
            <strong>중복제목 제거</strong>
            <span>똑같은 제목의 글이 여러 개면 첫 번째만 남깁니다</span>
          </div>
          <input class="toggle-input" id="duplicateExactToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>

        <label class="setting-row" for="duplicateLooseToggle">
          <div class="copy-block">
            <strong>유사제목 제거</strong>
            <span>숫자만 다른 비슷한 제목도 첫 번째만 남깁니다</span>
          </div>
          <input class="toggle-input" id="duplicateLooseToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>

        <label class="setting-row" for="preserveNoticeToggle">
          <div class="copy-block">
            <strong>공지/설문 보호</strong>
            <span>ON이면 공지·설문 글은 어떤 필터에도 숨기지 않습니다</span>
          </div>
          <input class="toggle-input" id="preserveNoticeToggle" type="checkbox">
          <span aria-hidden="true" class="toggle-ui"></span>
        </label>
      </section>

      <section class="panel fade-in" style="animation-delay:.18s">
        <div class="section-heading">
          <div class="section-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <div>
            <h2>탭 차단</h2>
            <p>ON으로 바꾸면 해당 탭의 글이 목록에서 즉시 숨겨집니다</p>
          </div>
        </div>

        <div class="action-grid">
          <button class="action-button action-button--primary" id="blockAllButton" type="button">전체 ON</button>
          <button class="action-button" id="unblockAllButton" type="button">전체 OFF</button>
          <button class="action-button" id="resetHeadsButton" type="button">기본값 복원</button>
        </div>

        <div class="head-list" id="headList"></div>
        <div class="empty-state" id="emptyState" hidden>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <strong>탭 목록을 찾지 못했습니다</strong>
          <span>특이점이 온다 갤러리 목록 페이지를 열면 자동으로 불러옵니다</span>
        </div>
      </section>

      <footer class="app-footer fade-in" style="animation-delay:.24s">
        DCInside 특이점이 온다 갤러리 전용
      </footer>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
